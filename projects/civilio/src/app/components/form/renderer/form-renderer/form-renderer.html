<form (submit)="handleSubmit($event)" hlmFieldGroup>
	@for(item of formDefinition().items; track item) {
	<ng-container> @let renderer = renderers[item.type]; </ng-container>
	<div>
		@if(renderer) { @if(item.type != 'field' && item.type != 'group') {
		<ng-container
			[ngComponentOutlet]="renderer | async"
			[ngComponentOutletInputs]="{
		itemDefinition: item,
		index: $index
	}"
		/>
		} @else if(item.type == 'field') {
		<ng-container
			[ngComponentOutlet]="renderer | async"
			[ngComponentOutletInputs]="{
			form: form,
			itemDefinition: item,
			index: $index
		}"
		/>
		} @else { } }
	</div>
	}
</form>
